[sync]
backfill_days = 180
overlap_days = 2

[ghosting]
ghost_days = 21

[review]
confidence_threshold = 0.6

[ollama]
host = "http://localhost:11434"
model = "qwen2.5:7b"

[paths]
db = "data/tracker.db"
credentials = "credentials.json"
token = "token.json"

# The LLM picks one of these based on the role title. Edit freely.
[categories]
names = ["Cloud Support", "DevOps/SRE", "Backend", "Platform/Infra", "Data", "Other"]

# Keys and values are compared after normalization (lowercase, suffixes stripped).
[company_aliases]
"aws" = "amazon"
"amazon web services" = "amazon"
# OpenEye is an Alarm.com subsidiary; its interview mail comes from the parent.
"alarm com" = "openeye"

[prefilter]
ats_domains = [
    "greenhouse.io",
    "greenhouse-mail.io",
    "lever.co",
    "myworkday.com",
    "myworkdayjobs.com",
    "myworkdaysite.com",
    "ashbyhq.com",
    "icims.com",
    "smartrecruiters.com",
    "jobvite.com",
    "bamboohr.com",
    "taleo.net",
    "successfactors.com",
    "oraclecloud.com",
    "eightfold.ai",
    "dayforcehcm.com",
    "workablemail.com",
    "hackerrankforwork.com",
    "codility.com",
    "codesignal.com",
    "adp.com",
    "brassring.com",
]
subject_keywords = [
    "application",
    "applying",
    "applied",
    "interview",
    "assessment",
    "candidacy",
    "candidate",
    "talent acquisition",
    "recruiter",
    "recruiting",
    "hiring",
    "offer",
    "next steps",
    "coding challenge",
    "take-home",
    "opportunity",
    "resume",
]
body_keywords = [
    "thank you for applying",
    "we received your application",
    "your application",
    "position you applied",
    "moving forward with other candidates",
    "not to move forward",
    "schedule your interview",
]
# Checked before noise_senders: senders that a noise rule would otherwise
# swallow. jobs-noreply@linkedin.com carries Easy Apply confirmations and
# rejections even though linkedin.com as a whole is noise.
allow_senders = [
    "jobs-noreply@linkedin.com",
]
noise_senders = [
    "linkedin.com",
    "indeed.com",
    "ziprecruiter.com",
    "glassdoor.com",
    "jobalerts",
]
noise_subject_patterns = [
    "job alert",
    "jobs for you",
    "new jobs",
    "recommended for you",
    "daily digest",
    "weekly digest",
    "newsletter",
    "dream job",
]
